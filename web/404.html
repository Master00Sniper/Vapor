<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Vapor</title>
    <link rel="icon" type="image/png" href="images/tray_icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0a;
            --bg-card: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --accent: #cc2020;
            --accent-hover: #ff3030;
            --accent-glow: rgba(204, 32, 32, 0.4);
            --accent-dim: #8a1515;
            --border: #2a2020;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('images/vapor_background.png') center center no-repeat;
            background-size: cover;
            opacity: 0.15;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, rgba(204, 32, 32, 0.15) 0%, transparent 50%);
            pointer-events: none;
        }
        h1, p, .btn { position: relative; z-index: 1; }
        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
            background: linear-gradient(180deg, #ffffff 0%, #ff1a1a 50%, #990000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 500px;
            margin-bottom: 2rem;
        }
        .btn {
            padding: 1rem 2rem;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: linear-gradient(180deg, var(--accent-hover) 0%, var(--accent) 50%, var(--accent-dim) 100%);
            color: white;
            box-shadow: 0 0 20px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.2);
            border: 1px solid var(--accent);
            transition: all 0.2s;
        }
        .btn:hover {
            background: linear-gradient(180deg, #ff4040 0%, var(--accent-hover) 50%, var(--accent) 100%);
            transform: translateY(-2px);
            box-shadow: 0 0 30px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <h1>Game Over</h1>
    <p>This page doesn't exist. Maybe it was closed by Vapor to free up resources.</p>
    <a href="index.html" class="btn">Back to Home</a>
</body>
</html>
